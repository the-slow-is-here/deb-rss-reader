<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-logo">📰</span>
      <h1>RSS Reader</h1>
    </div>
    <h2>{{ localeService.t('register.heading') }}</h2>
    @if (error()) { <div class="auth-error">{{ error() }}</div> }
    @if (backendErrors().length) {
      <div class="auth-error">
        <ul style="margin:0;padding-left:18px">
          @for (e of backendErrors(); track e) { <li>{{ e }}</li> }
        </ul>
      </div>
    }
    <form (submit)="submit(); $event.preventDefault()">
      <input type="email" [(ngModel)]="email" name="email" [placeholder]="localeService.t('register.email')" required autocomplete="email">
      <input type="password" [(ngModel)]="password" name="password" [placeholder]="localeService.t('register.password')" required autocomplete="new-password">
      <input type="password" [(ngModel)]="confirm" name="confirm" [placeholder]="localeService.t('register.confirm')" required autocomplete="new-password">
      <button class="auth-btn" type="submit" [disabled]="loading()">
        {{ loading() ? localeService.t('register.loading') : localeService.t('register.button') }}
      </button>
    </form>
    <p class="auth-switch">{{ localeService.t('register.hasAccount') }} <a routerLink="/login">{{ localeService.t('register.signIn') }}</a></p>
  </div>
</div>
